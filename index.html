<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="w-full max-w-xl bg-white rounded-2xl shadow-lg p-4 flex flex-col h-[80vh]">

        <!-- Chat Area -->
        <div id="chat" class="flex-1 overflow-y-auto space-y-2 mb-4"></div>

        <!-- Input -->
        <div class="flex gap-2">
            <input id="input" class="flex-1 border rounded-xl px-3 py-2" placeholder="Type message..." />
            <button onclick="sendMsg()" class="bg-blue-500 text-white px-4 rounded-xl">Send</button>
        </div>

    </div>

    <script>
        const API_KEY = "PASTE_YOUR_NEW_API_KEY_HERE";

        async function sendMsg() {
            const input = document.getElementById("input");
            const chat = document.getElementById("chat");

            const message = input.value;
            if (!message) return;

            chat.innerHTML += `<div class="text-right"><b>You:</b> ${message}</div>`;

            input.value = "";

            try {
                const res = await fetch(
                    `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=AIzaSyALHo3Fy43P4zswMmNnJ48En0Yi4aeX7WQ`,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            contents: [
                                {
                                    parts: [{ text: message }]
                                }
                            ]
                        })
                    }
                );

                const data = await res.json();

                const reply =
                    data.candidates?.[0]?.content?.parts?.[0]?.text || "No response";

                chat.innerHTML += `<div class="text-left text-green-600"><b>Bot:</b> ${reply}</div>`;
                chat.scrollTop = chat.scrollHeight;

            } catch (err) {
                chat.innerHTML += `<div class="text-red-500">Error</div>`;
            }
        }
    </script>

</body>

</html>
